# ─── Netlify deployment config for EvoveMyBrand ───
# Vite/Lovable outputs a client bundle to dist/client (not .output/public).
# SPA redirect catches all routes so TanStack Router handles them client-side.

[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — send all non-asset routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
