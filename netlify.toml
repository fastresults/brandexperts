# ─── Netlify deployment config for EvoveMyBrand (TanStack Start / Nitro SSR) ───
# Build: `npm run build` with NITRO_PRESET=netlify
# Static assets → .output/public/  (Netlify CDN)
# SSR handler  → .netlify/functions/server (Netlify Function, auto-written by Nitro)

[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION  = "20"
  NITRO_PRESET  = "netlify"

# Netlify Functions produced by Nitro netlify preset
[functions]
  node_bundler = "none"

# Route every non-static request to the Nitro SSR handler.
# Static files in .output/public/ are served directly (they take precedence).
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
