# ─── Netlify deployment config for EvoveMyBrand (TanStack Start / Nitro 3 SSR) ───
# Build: `npm run build` (vite.config.ts enables nitro({ preset: "netlify" }))
# Nitro emits dist/client (static), dist/server (SSR fn), and dist/nitro.json.
# Netlify's build image auto-detects dist/nitro.json and wires up the SSR
# function + redirects — publish dir must be the `dist` root, not dist/client.
# DO NOT add manual [[redirects]] or [functions] blocks — Netlify handles them
# automatically when it detects dist/nitro.json.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION  = "20"
  NITRO_PRESET  = "netlify"
